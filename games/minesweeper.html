<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayın Tarlası</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; }

        body {
            font-family: 'Comic Sans MS', 'Comic Sans', cursive, sans-serif;
            background: rgb(15, 29, 23);
            color: #f1f5f9;
            margin: 0;
            padding: 10px 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
        }

        /* ── TOP PANEL ── */
        .top-panel {
            flex-shrink: 0;
            width: 100%;
            max-width: 960px;
            background: rgba(15, 29, 23, 0.45);
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid rgba(45, 90, 67, 0.4);
            margin-bottom: 8px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .top-left, .top-right {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: nowrap;
        }

        .top-title {
            color: #6BAA75;
            margin: 0;
            font-size: 1.4rem;
            white-space: nowrap;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .diff-group {
            display: flex;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid rgba(45, 90, 67, 0.4);
        }

        .diff-btn {
            background: transparent;
            color: #a4c639;
            border: none;
            padding: 7px 14px;
            font-family: inherit;
            font-weight: bold;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .diff-btn:hover { background: rgba(255,255,255,0.05); }

        .diff-btn.active {
            background: linear-gradient(135deg, #2D5A43, #1A3A2A);
            color: white;
        }

        .stats-box {
            display: flex;
            gap: 16px;
            font-size: 1.1rem;
            color: #A4C639;
            font-weight: bold;
            background: rgba(0,0,0,0.2);
            padding: 7px 14px;
            border-radius: 8px;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
            white-space: nowrap;
        }

        .btn {
            background: linear-gradient(135deg, #2D5A43, #1A3A2A);
            color: white;
            border: none;
            padding: 7px 16px;
            font-size: 0.95rem;
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            box-shadow: 0 4px 12px rgba(45, 90, 67, 0.35);
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }

        .btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #6BAA75, #2D5A43);
        }

        /* ── GRID AREA ──
           JS calculates --sz and sets gridTemplateColumns before render,
           so the grid always fits the container exactly — no overflow, no scroll.
        */
        .grid-container {
            flex: 1;
            min-height: 0;
            width: 100%;
            max-width: 960px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .grid {
            display: grid;
            gap: 2px;
            background: rgba(255,255,255,0.05);
            padding: 8px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .cell {
            width: var(--sz, 28px);
            height: var(--sz, 28px);
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: calc(var(--sz, 28px) * 0.52);
            cursor: pointer;
            user-select: none;
            transition: background 0.1s;
        }

        .cell:hover  { background: rgba(255,255,255,0.2); }
        .cell.revealed { background: rgba(15,29,23,0.8); cursor: default; }
        .cell.mine     { background: #8B0000; }

        @keyframes popIn {
            0%   { transform: scale(0.3); opacity: 0; }
            50%  { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(1);   opacity: 1; }
        }

        .cell.mine.anim {
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .color-1 { color: #6BAA75; }
        .color-2 { color: #A4C639; }
        .color-3 { color: #DDA15E; }
        .color-4 { color: #BC6C25; }
        .color-5 { color: #8B0000; }
        .color-6 { color: #ffeb3b; }
        .color-7 { color: #ff9800; }
        .color-8 { color: #f44336; }

        /* ── GAME OVER MODAL ── */
        .game-over {
            position: fixed;
            inset: 0;
            margin: auto;
            width: min(90vw, 340px);
            height: fit-content;
            background: rgba(15,29,23,0.97);
            padding: 36px 32px;
            border-radius: 16px;
            border: 2px solid #8B0000;
            text-align: center;
            display: none;
            box-shadow: 0 0 50px rgba(139,0,0,0.5);
            z-index: 100;
        }

        .game-over h2 { color: #8B0000; margin-top: 0; }

        .game-won {
            border-color: #A4C639;
            box-shadow: 0 0 50px rgba(164,198,57,0.3);
        }

        .game-won h2 { color: #A4C639; }

        .show { display: block !important; }

        /* ── MOBILE CONTROLS ── */
        .mobile-controls {
            flex-shrink: 0;
            display: flex;
            gap: 10px;
            padding: 8px 0 4px;
            width: 100%;
            max-width: 960px;
            justify-content: center;
        }

        .mobile-btn {
            flex: 1;
            max-width: 200px;
            padding: 10px 16px;
            font-size: 1rem;
            font-weight: bold;
            font-family: inherit;
            border: 2px solid rgba(45,90,67,0.4);
            border-radius: 12px;
            background: rgba(0,0,0,0.3);
            color: #a4c639;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            user-select: none;
            white-space: nowrap;
        }

        .mobile-btn:hover { background: rgba(255,255,255,0.08); }

        .mobile-btn.active {
            background: linear-gradient(135deg, #2D5A43, #1A3A2A);
            color: white;
            border-color: #6BAA75;
            box-shadow: 0 0 14px rgba(107,170,117,0.45);
        }

        /* ── SMALL SCREENS ── */
        @media (max-width: 480px) {
            body { padding: 6px 8px; }

            .top-panel {
                padding: 7px 10px;
                margin-bottom: 6px;
                gap: 6px;
            }

            .top-title { display: none; }

            .top-left, .top-right { gap: 6px; }

            .diff-btn  { padding: 6px 9px;  font-size: 0.8rem; }
            .stats-box { gap: 10px; font-size: 0.9rem; padding: 6px 10px; }
            .btn       { padding: 6px 10px; font-size: 0.82rem; }

            .mobile-controls { padding: 6px 0 2px; gap: 8px; }
            .mobile-btn      { padding: 9px 12px;  font-size: 0.92rem; }
            .game-over       { padding: 24px 18px; }
        }

        /* ── LANDSCAPE PHONES ── */
        @media (max-height: 480px) and (orientation: landscape) {
            body { padding: 4px 10px; }

            .top-panel {
                padding: 5px 12px;
                margin-bottom: 4px;
                border-radius: 8px;
            }

            .top-title { display: none; }

            .diff-btn  { padding: 4px 10px; font-size: 0.8rem; }
            .stats-box { font-size: 0.85rem; padding: 4px 10px; }
            .btn       { padding: 4px 10px;  font-size: 0.82rem; }

            .mobile-controls { padding: 4px 0 2px; }
            .mobile-btn      { padding: 6px 14px;  font-size: 0.88rem; }
        }
    </style>
</head>

<body>

    <div class="top-panel">
        <div class="top-left">
            <h1 class="top-title">Mayın Tarlası</h1>
            <div class="diff-group">
                <button class="diff-btn active" id="btn-easy"   onclick="setDifficulty('easy')">Kolay</button>
                <button class="diff-btn"         id="btn-medium" onclick="setDifficulty('medium')">Orta</button>
                <button class="diff-btn"         id="btn-hard"   onclick="setDifficulty('hard')">Zor</button>
            </div>
        </div>
        <div class="top-right">
            <div class="stats-box">
                <div title="Kalan Mayın">💣 <span id="minesText">10</span></div>
                <div title="Geçen Süre (saniye)">⏱️ <span id="timerText">0</span></div>
            </div>
            <button class="btn" onclick="initGame()" title="Yeniden Başlat">🔄 Yenile</button>
        </div>
    </div>

    <div class="grid-container">
        <div class="grid" id="grid"></div>
    </div>

    <div class="mobile-controls">
        <button class="mobile-btn active" id="digBtn"  onclick="setMobileMode('dig')">⛏️ Kürek</button>
        <button class="mobile-btn"        id="flagBtn" onclick="setMobileMode('flag')">🚩 Bayrak</button>
    </div>

    <div class="game-over" id="gameOverModal">
        <h2 id="gameOverTitle">Oyun Bitti!</h2>
        <p  id="gameOverDesc">Mayına bastın...</p>
        <button class="btn" onclick="initGame()" style="margin: 20px auto 0; justify-content: center;">Tekrar Dene</button>
    </div>

    <script>
        /* ── AUDIO ── */
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function playSound(type) {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc  = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            const t = audioCtx.currentTime;

            if (type === 'click') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, t);
                osc.frequency.exponentialRampToValueAtTime(500, t + 0.05);
                gain.gain.setValueAtTime(0.15, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
                osc.start(t); osc.stop(t + 0.1);
            } else if (type === 'flag') {
                osc.type = 'square';
                osc.frequency.setValueAtTime(600, t);
                osc.frequency.setValueAtTime(800, t + 0.05);
                gain.gain.setValueAtTime(0.06, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
                osc.start(t); osc.stop(t + 0.1);
            } else if (type === 'pop') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(120, t);
                osc.frequency.exponentialRampToValueAtTime(40, t + 0.2);
                gain.gain.setValueAtTime(0.2, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
                osc.start(t); osc.stop(t + 0.2);
            } else if (type === 'boom') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(150, t);
                osc.frequency.exponentialRampToValueAtTime(20, t + 0.5);
                gain.gain.setValueAtTime(0.6, t);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
                osc.start(t); osc.stop(t + 0.5);
            } else if (type === 'win') {
                osc.type = 'sine';
                [400, 523.25, 659.25, 783.99, 1046.50].forEach((f, i) =>
                    osc.frequency.setValueAtTime(f, t + i * 0.1));
                gain.gain.setValueAtTime(0.3, t);
                gain.gain.linearRampToValueAtTime(0, t + 0.6);
                osc.start(t); osc.stop(t + 0.6);
            } else if (type === 'lose') {
                osc.type = 'sawtooth';
                [300, 250, 200, 150].forEach((f, i) =>
                    osc.frequency.setValueAtTime(f, t + i * 0.2));
                gain.gain.setValueAtTime(0.3, t);
                gain.gain.linearRampToValueAtTime(0, t + 1.0);
                osc.start(t); osc.stop(t + 1.0);
            }
        }

        /* ── GAME STATE ── */
        let ROWS = 9, COLS = 9, MINES = 10;
        let board = [], revealedCount = 0, flaggedCount = 0;
        let isGameOver = false, isFirstClick = true;
        let timer = 0, timerInterval;
        let mobileMode = 'dig';

        const gridEl = document.getElementById('grid');

        function setDifficulty(level) {
            document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + level).classList.add('active');
            const narrow = window.innerWidth < 540;
            if      (level === 'easy')   { ROWS = 9;  COLS = 9;  MINES = 10; }
            else if (level === 'medium') { ROWS = 16; COLS = 16; MINES = 40; }
            else if (level === 'hard')   { ROWS = 16; COLS = narrow ? 20 : 30; MINES = narrow ? 80 : 99; }
            initGame();
        }

        function setMobileMode(mode) {
            mobileMode = mode;
            document.getElementById('digBtn').classList.toggle('active',  mode === 'dig');
            document.getElementById('flagBtn').classList.toggle('active', mode === 'flag');
        }

        /* ── CELL SIZE: measured in JS, never guessed in CSS ──
           Reads the real pixel dimensions of .grid-container after layout,
           then computes the largest integer cell size that fits without overflow.
        */
        function setCellSize() {
            const container = document.querySelector('.grid-container');
            const gridPad   = 16;   // .grid padding: 8px × 2
            const gap       = 2;    // gap between cells

            const availW = container.clientWidth  - gridPad;
            const availH = container.clientHeight - gridPad;

            const szW = Math.floor((availW - gap * (COLS - 1)) / COLS);
            const szH = Math.floor((availH - gap * (ROWS - 1)) / ROWS);
            const sz  = Math.min(szW, szH, 36);  // cap at 36px on desktop

            gridEl.style.setProperty('--sz', sz + 'px');
            gridEl.style.gridTemplateColumns = `repeat(${COLS}, ${sz}px)`;
        }

        /* ── INIT ── */
        function initGame() {
            board = Array.from({ length: ROWS }, () =>
                Array.from({ length: COLS }, () => ({
                    isMine: false, isRevealed: false,
                    isFlagged: false, neighborMines: 0
                }))
            );
            revealedCount = 0; flaggedCount = 0;
            isGameOver = false; isFirstClick = true;
            clearInterval(timerInterval);
            timer = 0;

            document.getElementById('gameOverModal').classList.remove('show', 'game-won');

            // Measure container AFTER current layout pass, then render.
            requestAnimationFrame(() => {
                setCellSize();
                renderBoard();
                updateStats();
            });
        }

        // Re-fit on window resize (e.g. orientation change, browser chrome toggling)
        let resizeTimer;
        window.addEventListener('resize', () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => { setCellSize(); renderBoard(); }, 150);
        });

        /* ── MINES & NEIGHBORS ── */
        function placeMines(firstR, firstC) {
            let placed = 0;
            while (placed < MINES) {
                const r = Math.floor(Math.random() * ROWS);
                const c = Math.floor(Math.random() * COLS);
                if (!board[r][c].isMine && !(Math.abs(r - firstR) <= 1 && Math.abs(c - firstC) <= 1)) {
                    board[r][c].isMine = true;
                    placed++;
                }
            }
            for (let r = 0; r < ROWS; r++)
                for (let c = 0; c < COLS; c++)
                    if (!board[r][c].isMine) {
                        let n = 0;
                        for (let dr = -1; dr <= 1; dr++)
                            for (let dc = -1; dc <= 1; dc++)
                                if (r+dr >= 0 && r+dr < ROWS && c+dc >= 0 && c+dc < COLS && board[r+dr][c+dc].isMine) n++;
                        board[r][c].neighborMines = n;
                    }
            clearInterval(timerInterval);
            timerInterval = setInterval(() => { if (!isGameOver) { timer++; updateStats(); } }, 1000);
        }

        function updateStats() {
            document.getElementById('minesText').innerText = MINES - flaggedCount;
            document.getElementById('timerText').innerText = timer;
        }

        /* ── RENDER ── */
        function renderBoard() {
            gridEl.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell     = document.createElement('div');
                    const cellData = board[r][c];
                    cell.className = 'cell';

                    if (cellData.isRevealed) {
                        cell.classList.add('revealed');
                        if (cellData.isMine) {
                            cell.classList.add('mine');
                            cell.innerHTML = '💣';
                        } else if (cellData.neighborMines > 0) {
                            cell.innerHTML = cellData.neighborMines;
                            cell.classList.add(`color-${cellData.neighborMines}`);
                        }
                    } else if (cellData.isFlagged) {
                        cell.innerHTML = '🚩';
                    }

                    cell.addEventListener('click', () => {
                        if (isGameOver) return;
                        if (cellData.isRevealed && cellData.neighborMines > 0) { playSound('click'); chord(r, c); return; }
                        if (cellData.isRevealed) return;
                        if (mobileMode === 'flag') { playSound('flag'); toggleFlag(r, c); }
                        else { if (!cellData.isFlagged) playSound('click'); reveal(r, c); }
                    });

                    cell.addEventListener('contextmenu', e => {
                        e.preventDefault();
                        if (!isGameOver && !cellData.isRevealed) playSound('flag');
                        toggleFlag(r, c);
                    });

                    cell.addEventListener('mousedown', e => {
                        if (e.button === 1) { e.preventDefault(); if (!isGameOver && cellData.isRevealed) playSound('click'); chord(r, c); }
                    });

                    gridEl.appendChild(cell);
                }
            }
        }

        /* ── GAME LOGIC ── */
        function chord(r, c) {
            if (isGameOver || !board[r][c].isRevealed || board[r][c].neighborMines === 0) return;
            let flags = 0;
            for (let dr = -1; dr <= 1; dr++)
                for (let dc = -1; dc <= 1; dc++)
                    if (r+dr >= 0 && r+dr < ROWS && c+dc >= 0 && c+dc < COLS && board[r+dr][c+dc].isFlagged) flags++;
            if (flags === board[r][c].neighborMines)
                for (let dr = -1; dr <= 1; dr++)
                    for (let dc = -1; dc <= 1; dc++)
                        if (r+dr >= 0 && r+dr < ROWS && c+dc >= 0 && c+dc < COLS
                            && !board[r+dr][c+dc].isRevealed && !board[r+dr][c+dc].isFlagged)
                            reveal(r+dr, c+dc);
        }

        function reveal(r, c) {
            if (isGameOver || board[r][c].isRevealed || board[r][c].isFlagged) return;
            if (isFirstClick) { isFirstClick = false; placeMines(r, c); }
            board[r][c].isRevealed = true;
            revealedCount++;
            if (board[r][c].isMine) { gameOver(false, r, c); return; }
            if (board[r][c].neighborMines === 0)
                for (let dr = -1; dr <= 1; dr++)
                    for (let dc = -1; dc <= 1; dc++)
                        if (r+dr >= 0 && r+dr < ROWS && c+dc >= 0 && c+dc < COLS) reveal(r+dr, c+dc);
            checkWin();
            if (!isGameOver) renderBoard();
        }

        function toggleFlag(r, c) {
            if (isGameOver || board[r][c].isRevealed) return;
            board[r][c].isFlagged = !board[r][c].isFlagged;
            flaggedCount += board[r][c].isFlagged ? 1 : -1;
            updateStats();
            renderBoard();
        }

        function gameOver(won, clickedR = -1, clickedC = -1) {
            isGameOver = true;
            clearInterval(timerInterval);
            const modal = document.getElementById('gameOverModal');
            document.getElementById('gameOverTitle').innerText = won ? 'Kazandın! 🏆' : 'Oyun Bitti! 💀';
            document.getElementById('gameOverDesc').innerText  = won ? `Tebrikler! Skorun: ${timer}s` : 'Mayına bastın...';

            if (won) { playSound('win'); modal.classList.add('game-won', 'show'); return; }
            playSound('boom');

            let allMines = [];
            for (let r = 0; r < ROWS; r++)
                for (let c = 0; c < COLS; c++)
                    if (board[r][c].isMine) { board[r][c].isRevealed = true; if (r !== clickedR || c !== clickedC) allMines.push({r,c}); }

            if (clickedR !== -1)
                allMines.sort((a,b) => Math.hypot(a.r-clickedR,a.c-clickedC) - Math.hypot(b.r-clickedR,b.c-clickedC));

            function animateMine(r, c, delay) {
                setTimeout(() => {
                    const cell = gridEl.children[r * COLS + c];
                    if (cell && !cell.classList.contains('anim')) {
                        cell.classList.add('revealed','mine','anim');
                        cell.innerHTML = '💣';
                        playSound('pop');
                    }
                }, delay);
            }

            let delay = 0;
            if (clickedR !== -1) { animateMine(clickedR, clickedC, 0); delay = 500; }
            allMines.forEach(m => { animateMine(m.r, m.c, delay); delay += 80; });
            setTimeout(() => { playSound('lose'); modal.classList.add('show'); }, delay + 600);
        }

        function checkWin() {
            if (revealedCount === ROWS * COLS - MINES) gameOver(true);
        }

        initGame();
    </script>
</body>

</html>
