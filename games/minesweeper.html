<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Mayın Tarlası – LvlUp</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        /* ═══════════════════════════════
   RESET & TOKENS
═══════════════════════════════ */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            background: none;
        }

        :root {
            --bg: #080f0b;
            --bg-board: #0d1a10;
            /* gap rengi — hücreden koyu */
            --cell: #1b3022;
            --cell-h: #233d2b;
            --cell-open: #070e09;
            --cell-flag: #1d2d0c;
            --cell-boom: #5a0000;
            --cell-dead: #2a0707;

            --g-dark: #1A3A2A;
            --g-mid: #2D5A43;
            --g-light: #6BAA75;
            --neon: #A4C639;
            --neon-glow: rgba(164, 198, 57, .55);
            --red: #8B0000;

            --txt: #f1f5f9;
            --txt-dim: #94a3b8;
            --txt-muted: #4d6858;

            --border: rgba(45, 90, 67, .38);
            --surface: rgba(12, 22, 16, .9);
        }

        html {
            height: 100dvh;
            overflow: hidden;
        }

        body {
            height: 100dvh;
            overflow: hidden;
            font-family: 'Inter', sans-serif;
            color: var(--txt);
            background: var(--bg);
            display: flex;
            flex-direction: column;
        }

        /* ═══════════════════════════════
   HUD  (top)
═══════════════════════════════ */
        .hud {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            z-index: 10;
            flex-wrap: wrap;
        }

        .hud-title {
            font-family: 'Orbitron', sans-serif;
            font-size: .85rem;
            font-weight: 700;
            color: var(--g-light);
            letter-spacing: .06em;
            white-space: nowrap;
            text-shadow: 0 0 14px rgba(107, 170, 117, .4);
        }

        .diff-tabs {
            display: flex;
            background: rgba(0, 0, 0, .35);
            border: 1px solid var(--border);
            border-radius: 7px;
            overflow: hidden;
        }

        .diff-tab {
            padding: 6px 13px;
            font-size: .78rem;
            font-weight: 600;
            color: var(--neon);
            line-height: 1;
            white-space: nowrap;
            transition: background .15s, color .15s;
        }

        .diff-tab:hover {
            background: rgba(255, 255, 255, .07);
        }

        .diff-tab.on {
            background: linear-gradient(135deg, var(--g-mid), var(--g-dark));
            color: #fff;
        }

        .hud-spacer {
            flex: 1;
        }

        .lcd {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 11px;
            background: #020b04;
            border: 1px solid rgba(164, 198, 57, .16);
            border-radius: 7px;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, .5);
        }

        .lcd-icon {
            font-size: .8rem;
            line-height: 1;
        }

        .lcd-val {
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--neon);
            text-shadow: 0 0 8px var(--neon-glow);
            min-width: 2.2ch;
            text-align: right;
            letter-spacing: .04em;
        }

        .hud-btn {
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--g-mid), var(--g-dark));
            border-radius: 8px;
            color: #fff;
            flex-shrink: 0;
            box-shadow: 0 3px 10px rgba(45, 90, 67, .4);
            transition: transform .15s, box-shadow .15s;
        }

        .hud-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 14px rgba(45, 90, 67, .55);
        }

        .hud-btn:active {
            transform: scale(.92);
        }

        .hud-btn svg {
            display: block;
        }

        /* ═══════════════════════════════
   BOARD WRAP
═══════════════════════════════ */
        .board-wrap {
            flex: 1;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        /* ═══════════════════════════════
   GRID & CELLS
═══════════════════════════════ */
        .grid {
            display: grid;
            gap: var(--gap, 4px);
            background: var(--bg-board);
            /* gap rengi buradan geliyor */
            padding: var(--gap, 4px);
            border-radius: 10px;
        }

        .c {
            width: var(--sz);
            height: var(--sz);
            background: var(--cell);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(var(--sz) * .48);
            font-weight: 700;
            line-height: 1;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            position: relative;
            transition: background .1s, transform .08s;
        }

        .c:hover:not(.open):not(.boom):not(.dead) {
            background: var(--cell-h);
        }

        .c:active:not(.open) {
            transform: scale(.86);
        }

        .c.open {
            background: var(--cell-open);
            cursor: default;
        }

        .c.flag {
            background: var(--cell-flag);
        }

        .c.boom {
            background: var(--cell-boom) !important;
            box-shadow: 0 0 10px rgba(139, 0, 0, .7) !important;
            cursor: default;
        }

        .c.dead {
            background: var(--cell-dead);
            cursor: default;
        }

        /* long-press ring */
        .c.pressing::after {
            content: '';
            position: absolute;
            inset: 1px;
            border-radius: 3px;
            border: 2px solid var(--neon);
            opacity: 0;
            animation: pressRing .44s linear forwards;
            pointer-events: none;
        }

        @keyframes pressRing {
            0% {
                opacity: 0;
                transform: scale(.4);
            }

            35% {
                opacity: 1;
            }

            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* pop */
        @keyframes cellPop {
            0% {
                transform: scale(.1);
                opacity: 0;
            }

            55% {
                transform: scale(1.2);
            }

            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .c.pop {
            animation: cellPop .28s cubic-bezier(.175, .885, .32, 1.275) forwards;
        }

        /* chord */
        @keyframes chordFlash {

            0%,
            100% {
                background: var(--cell-open);
            }

            45% {
                background: rgba(45, 90, 67, .5);
            }
        }

        .c.chord {
            animation: chordFlash .26s ease;
        }

        /* win */
        @keyframes winPulse {

            0%,
            100% {
                background: var(--cell-open);
            }

            40% {
                background: rgba(45, 100, 67, .45);
            }
        }

        .c.win {
            animation: winPulse .5s ease var(--wd, 0ms) both;
        }

        /* number colors */
        .n1 {
            color: #6BAA75
        }

        .n2 {
            color: #A4C639
        }

        .n3 {
            color: #DDA15E
        }

        .n4 {
            color: #BC6C25
        }

        .n5 {
            color: #d95f5f
        }

        .n6 {
            color: #f5c518
        }

        .n7 {
            color: #ff7043
        }

        .n8 {
            color: #ef5350
        }

        /* ═══════════════════════════════
   ACTION BAR  (bottom)
═══════════════════════════════ */
        .action-bar {
            flex-shrink: 0;
            display: flex;
            gap: 8px;
            padding: 8px 14px 10px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            justify-content: center;
            z-index: 10;
        }

        .mode-btn {
            flex: 1;
            max-width: 200px;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            background: rgba(0, 0, 0, .3);
            color: var(--neon);
            font-size: .88rem;
            font-weight: 700;
            white-space: nowrap;
            transition: all .18s;
        }

        .mode-btn:hover {
            background: rgba(255, 255, 255, .07);
        }

        .mode-btn.on {
            background: linear-gradient(135deg, var(--g-mid), var(--g-dark));
            border-color: var(--g-light);
            color: #fff;
            box-shadow: 0 0 16px rgba(107, 170, 117, .3);
        }

        /* ═══════════════════════════════
   RESULT OVERLAY
═══════════════════════════════ */
        .overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, .65);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            opacity: 0;
            pointer-events: none;
            transition: opacity .22s;
        }

        .overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .r-card {
            width: min(88vw, 310px);
            background: linear-gradient(155deg, rgba(14, 26, 19, .98), rgba(7, 12, 9, .98));
            border-radius: 18px;
            padding: 30px 24px 24px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            transform: scale(.82);
            transition: transform .28s cubic-bezier(.175, .885, .32, 1.275);
        }

        .overlay.show .r-card {
            transform: scale(1);
        }

        .r-card.lost {
            border: 2px solid var(--red);
            box-shadow: 0 0 55px rgba(139, 0, 0, .4);
        }

        .r-card.won {
            border: 2px solid var(--neon);
            box-shadow: 0 0 55px rgba(164, 198, 57, .22);
        }

        .r-emoji {
            font-size: 2.8rem;
            line-height: 1;
            margin-bottom: 3px;
        }

        .r-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: .04em;
        }

        .r-card.lost .r-title {
            color: #e05555;
        }

        .r-card.won .r-title {
            color: var(--neon);
            text-shadow: 0 0 10px var(--neon-glow);
        }

        .r-sub {
            font-size: .88rem;
            color: var(--txt-dim);
            margin-bottom: 6px;
        }

        .r-stats {
            display: flex;
            gap: 8px;
            width: 100%;
            margin: 4px 0 18px;
        }

        .r-stat {
            flex: 1;
            padding: 8px 8px 9px;
            background: rgba(0, 0, 0, .3);
            border: 1px solid var(--border);
            border-radius: 7px;
        }

        .r-stat-l {
            font-size: .64rem;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            color: var(--txt-muted);
            margin-bottom: 3px;
        }

        .r-stat-v {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--neon);
        }

        .r-btn {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--g-mid), var(--g-dark));
            color: #fff;
            font-size: .92rem;
            font-weight: 700;
            box-shadow: 0 4px 14px rgba(45, 90, 67, .4);
            transition: transform .15s, box-shadow .15s;
        }

        .r-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 18px rgba(45, 90, 67, .55);
        }

        .r-btn:active {
            transform: scale(.97);
        }

        /* ═══════════════════════════════════════════════════════
   DESKTOP  (≥ 769px)
   Board ortalanmış kart içinde, hücreler ekrana sığacak
═══════════════════════════════════════════════════════ */
        @media (min-width: 769px) {
            .board-wrap {
                padding: 14px;
            }

            .grid {
                box-shadow: 0 10px 40px rgba(0, 0, 0, .5);
                border: 1px solid var(--border);
            }
        }

        /* ═══════════════════════════════════════════════════════
   MOBİL  (≤ 768px) — sıfırdan tasarım
═══════════════════════════════════════════════════════ */
        @media (max-width: 768px) {

            /* ── HUD: 2 SATIR ──────────────────────────────────
     Satır 1: zorluk tab barı (tam genişlik)
     Satır 2: mayın sayacı  +  süre  +  yeni oyun
  ─────────────────────────────────────────────────── */
            .hud {
                flex-wrap: wrap;
                /* diff-tabs kendi satırına düşsün */
                padding: 0;
                gap: 0;
                align-items: stretch;
            }

            .hud-title {
                display: none;
            }

            .hud-spacer {
                display: none;
            }

            /* SATIR 1 */
            .diff-tabs {
                width: 100%;
                border-radius: 0;
                border: none;
                border-bottom: 1px solid var(--border);
                background: rgba(0, 0, 0, .18);
            }

            .diff-tab {
                flex: 1;
                text-align: center;
                padding: 12px 6px;
                font-size: .83rem;
            }

            /* SATIR 2 */
            .lcd {
                padding: 10px 14px;
                border-radius: 0;
                background: transparent;
                border: none;
                box-shadow: none;
                gap: 6px;
            }

            .lcd-val {
                font-size: 1.05rem;
                min-width: 2.2ch;
            }

            .lcd-icon {
                font-size: .85rem;
            }

            .hud-btn {
                margin-left: auto;
                /* sağa it */
                margin-right: 12px;
                align-self: center;
                width: 38px;
                height: 38px;
                border-radius: 9px;
                flex-shrink: 0;
            }

            /* ── BOARD ──────────────────────────────────────────
     Kart çerçevesi yok. Grid arka planı gap rengi görevi görür.
     Board tam kalan yüksekliği kullanır, overflow: hidden (hücreler sığar).
  ─────────────────────────────────────────────────── */
            .board-wrap {
                padding: 10px;
                overflow: hidden;
                align-items: center;
                justify-content: center;
                background: var(--bg);
            }

            .grid {
                border: none !important;
                box-shadow: none !important;
                border-radius: 9px;
            }

            .c {
                border-radius: 6px;
            }

            /* ── ACTION BAR ─────────────────────────────────────
     İki büyük mod butonu. Minimum 52px yükseklik.
  ─────────────────────────────────────────────────── */
            .action-bar {
                padding: 10px 12px 16px;
                gap: 10px;
            }

            .mode-btn {
                max-width: none;
                flex: 1;
                padding: 16px 10px;
                font-size: 1rem;
                border-radius: 14px;
                border-width: 2px;
                letter-spacing: .01em;
            }
        }

        /* ── LANDSCAPE TELEFON ── */
        @media (max-height: 500px) and (orientation: landscape) {
            .hud-title {
                display: none;
            }

            .hud {
                flex-wrap: nowrap;
                padding: 5px 12px;
                align-items: center;
            }

            .diff-tabs {
                width: auto;
                border: 1px solid var(--border);
                border-radius: 7px;
                background: rgba(0, 0, 0, .35);
            }

            .diff-tab {
                padding: 5px 10px;
                font-size: .74rem;
            }

            .lcd {
                padding: 4px 9px;
                background: #020b04;
                border: 1px solid rgba(164, 198, 57, .16);
                border-radius: 7px;
                box-shadow: inset 0 2px 5px rgba(0, 0, 0, .5);
            }

            .lcd-val {
                font-size: .85rem;
            }

            .hud-btn {
                margin-left: 0;
                margin-right: 0;
            }

            .board-wrap {
                padding: 5px 8px;
            }

            .action-bar {
                padding: 5px 12px 8px;
                gap: 8px;
            }

            .mode-btn {
                padding: 8px 14px;
                font-size: .84rem;
                border-radius: 10px;
            }
        }
    </style>
</head>

<body>

    <!-- HUD -->
    <header class="hud">
        <div class="diff-tabs">
            <button class="diff-tab on" id="d-easy" onclick="setDiff('easy')">Kolay</button>
            <button class="diff-tab" id="d-medium" onclick="setDiff('medium')">Orta</button>
            <button class="diff-tab" id="d-hard" onclick="setDiff('hard')">Zor</button>
        </div>
        <div class="hud-spacer"></div>
        <div class="lcd" title="Kalan mayın">
            <span class="lcd-icon">💣</span>
            <span class="lcd-val" id="hud-mines">10</span>
        </div>
        <div class="lcd" title="Süre">
            <span class="lcd-icon">⏱</span>
            <span class="lcd-val" id="hud-time">0</span>
        </div>
        <button class="hud-btn" onclick="newGame()" title="Yeni oyun">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" />
                <path d="M3 3v5h5" />
            </svg>
        </button>
    </header>

    <!-- BOARD -->
    <div class="board-wrap" id="boardWrap">
        <div class="grid" id="grid"></div>
    </div>

    <!-- ACTION BAR -->
    <div class="action-bar">
        <button class="mode-btn on" id="btn-dig" onclick="setMode('dig')">⛏️ Kürek</button>
        <button class="mode-btn" id="btn-flag" onclick="setMode('flag')">🚩 Bayrak</button>
    </div>

    <!-- RESULT OVERLAY -->
    <div class="overlay" id="overlay">
        <div class="r-card" id="rCard">
            <div class="r-emoji" id="rEmoji">💣</div>
            <div class="r-title" id="rTitle">Oyun Bitti</div>
            <div class="r-sub" id="rSub">Mayına bastın!</div>
            <div class="r-stats">
                <div class="r-stat">
                    <div class="r-stat-l">Süre</div>
                    <div class="r-stat-v" id="rTime">0s</div>
                </div>
                <div class="r-stat">
                    <div class="r-stat-l">Mayın</div>
                    <div class="r-stat-v" id="rMines">10</div>
                </div>
                <div class="r-stat">
                    <div class="r-stat-l">Zorluk</div>
                    <div class="r-stat-v" id="rDiff">Kolay</div>
                </div>
            </div>
            <button class="r-btn" onclick="newGame()">Tekrar Oyna</button>
        </div>
    </div>

    <script>
        /* ── AUDIO ── */
        let _ac;
        function ac() {
            if (!_ac) _ac = new (window.AudioContext || window.webkitAudioContext)();
            if (_ac.state === 'suspended') _ac.resume();
            return _ac;
        }
        function beep(t) {
            try {
                const c = ac(), now = c.currentTime;
                const o = c.createOscillator(), g = c.createGain();
                o.connect(g); g.connect(c.destination);
                ({
                    dig: () => { o.type = 'sine'; o.frequency.setValueAtTime(300, now); o.frequency.linearRampToValueAtTime(480, now + .06); g.gain.setValueAtTime(.12, now); g.gain.exponentialRampToValueAtTime(.001, now + .12); o.start(now); o.stop(now + .12); },
                    flag: () => { o.type = 'square'; o.frequency.setValueAtTime(640, now); o.frequency.setValueAtTime(860, now + .05); g.gain.setValueAtTime(.05, now); g.gain.exponentialRampToValueAtTime(.001, now + .12); o.start(now); o.stop(now + .12); },
                    pop: () => { o.type = 'triangle'; o.frequency.setValueAtTime(120, now); o.frequency.exponentialRampToValueAtTime(40, now + .2); g.gain.setValueAtTime(.15, now); g.gain.exponentialRampToValueAtValue(.001, now + .2); o.start(now); o.stop(now + .2); },
                    boom: () => { o.type = 'sawtooth'; o.frequency.setValueAtTime(160, now); o.frequency.exponentialRampToValueAtTime(18, now + .6); g.gain.setValueAtTime(.5, now); g.gain.exponentialRampToValueAtTime(.001, now + .6); o.start(now); o.stop(now + .6); },
                    win: () => { o.type = 'sine';[400, 523, 659, 784, 1047].forEach((f, i) => o.frequency.setValueAtTime(f, now + i * .09)); g.gain.setValueAtTime(.25, now); g.gain.linearRampToValueAtTime(0, now + .6); o.start(now); o.stop(now + .6); },
                    lose: () => { o.type = 'sawtooth';[280, 230, 180, 130].forEach((f, i) => o.frequency.setValueAtTime(f, now + i * .22)); g.gain.setValueAtTime(.25, now); g.gain.linearRampToValueAtTime(0, now + 1.1); o.start(now); o.stop(now + 1.1); },
                })[t]?.();
            } catch (_) { }
        }

        /* ── STATE ── */
        let ROWS = 9, COLS = 9, MINES = 10, DIFF = 'Kolay';
        let board = [], opened = 0, flagged = 0;
        let over = false, fresh = true, secs = 0, ticker = null, mode = 'dig';
        let explodeTimers = [];

        const gridEl = document.getElementById('grid');
        const isMob = () => window.innerWidth <= 768;

        /* ── DIFFICULTY ── */
        function setDiff(lvl) {
            document.querySelectorAll('.diff-tab').forEach(b => b.classList.remove('on'));
            document.getElementById('d-' + lvl).classList.add('on');
            const m = isMob();
            //                    MOBİL (COLS×ROWS / MINES)    MASAÜSTÜ
            if (lvl === 'easy') { ROWS = m ? 8 : 9; COLS = m ? 8 : 9; MINES = m ? 10 : 10; DIFF = 'Kolay'; }
            else if (lvl === 'medium') { ROWS = m ? 10 : 16; COLS = m ? 9 : 16; MINES = m ? 20 : 40; DIFF = 'Orta'; }
            else { ROWS = m ? 14 : 16; COLS = m ? 9 : 30; MINES = m ? 30 : 99; DIFF = 'Zor'; }
            newGame();
        }

        /* ── MODE ── */
        function setMode(m) {
            mode = m;
            document.getElementById('btn-dig').classList.toggle('on', m === 'dig');
            document.getElementById('btn-flag').classList.toggle('on', m === 'flag');
        }

        /* ── CELL SIZE ── */
        function calcSize() {
            const wrap = document.getElementById('boardWrap');
            const GAP = 4;

            if (isMob()) {
                /* ── MOBİL ──────────────────────────────────────────────
                   Hücreler tam olarak board-wrap'a sığar, overflow olmaz.
                   Hesaplama: kullanılabilir piksel / hücre sayısı.
                   - sidePad: board-wrap padding (10px × 2 = 20px)
                   - gridPad: grid'in kendi padding'i (4px × 2 = 8px)
                ─────────────────────────────────────────────────────── */
                const sidePad = 20, gridPad = 8;
                const aw = wrap.clientWidth - sidePad - gridPad - GAP * (COLS - 1);
                const ah = wrap.clientHeight - sidePad - gridPad - GAP * (ROWS - 1);
                const sz = Math.max(20, Math.min(Math.floor(aw / COLS), Math.floor(ah / ROWS), 54));
                gridEl.style.setProperty('--sz', sz + 'px');
                gridEl.style.setProperty('--gap', GAP + 'px');
                gridEl.style.gridTemplateColumns = `repeat(${COLS}, ${sz}px)`;
            } else {
                /* ── MASAÜSTÜ (mevcut mantık, değiştirilmedi) ── */
                const wPad = 28, gPad = GAP * 2;
                const aw = wrap.clientWidth - wPad - gPad - GAP * (COLS - 1);
                const ah = wrap.clientHeight - wPad - gPad - GAP * (ROWS - 1);
                const sz = Math.max(18, Math.min(Math.floor(aw / COLS), Math.floor(ah / ROWS), 42));
                gridEl.style.setProperty('--sz', sz + 'px');
                gridEl.style.setProperty('--gap', GAP + 'px');
                gridEl.style.gridTemplateColumns = `repeat(${COLS}, ${sz}px)`;
            }
        }

        /* ── INIT ── */
        function newGame() {
            clearInterval(ticker);
            explodeTimers.forEach(clearTimeout);
            explodeTimers = [];
            board = Array.from({ length: ROWS }, () =>
                Array.from({ length: COLS }, () => ({ mine: false, open: false, flag: false, n: 0 })));
            opened = flagged = secs = 0; over = false; fresh = true;
            document.getElementById('overlay').classList.remove('show');
            updateHUD();
            requestAnimationFrame(() => { calcSize(); renderAll(); });
        }

        let _rsz;
        window.addEventListener('resize', () => {
            clearTimeout(_rsz);
            _rsz = setTimeout(() => { calcSize(); }, 160);
        });

        function updateHUD() {
            document.getElementById('hud-mines').textContent = MINES - flagged;
            document.getElementById('hud-time').textContent = secs;
        }

        /* ── MINES ── */
        function plantMines(fr, fc) {
            const MAX_ATTEMPTS = 200;
            let attempts = 0;
            do {
                eachCell(d => { d.mine = false; d.n = 0; });
                let p = 0;
                while (p < MINES) {
                    const r = Math.floor(Math.random() * ROWS), c = Math.floor(Math.random() * COLS);
                    if (!board[r][c].mine && !(Math.abs(r - fr) <= 1 && Math.abs(c - fc) <= 1)) {
                        board[r][c].mine = true; p++;
                    }
                }
                eachCell((d, r, c) => {
                    if (d.mine) return;
                    let n = 0; eachNeighbor(r, c, nb => { if (nb.mine) n++; }); d.n = n;
                });
                attempts++;
            } while (attempts < MAX_ATTEMPTS && !isSolvable(fr, fc));

            ticker = setInterval(() => { if (!over) { secs++; updateHUD(); } }, 1000);
        }

        function isSolvable(fr, fc) {
            const open = Array.from({ length: ROWS }, () => new Array(COLS).fill(false));
            const flag = Array.from({ length: ROWS }, () => new Array(COLS).fill(false));

            function revealSim(r, c) {
                const q = [[r, c]];
                while (q.length) {
                    const [rr, cc] = q.shift();
                    if (open[rr][cc] || board[rr][cc].mine) continue;
                    open[rr][cc] = true;
                    if (board[rr][cc].n === 0) {
                        for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
                            if (!dr && !dc) continue;
                            const nr = rr + dr, nc = cc + dc;
                            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && !open[nr][nc]) q.push([nr, nc]);
                        }
                    }
                }
            }

            revealSim(fr, fc);

            let progress = true;
            while (progress) {
                progress = false;
                for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
                    if (!open[r][c]) continue;
                    const num = board[r][c].n;
                    const hidden = [], adjFlags = [];
                    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
                        if (!dr && !dc) continue;
                        const nr = r + dr, nc = c + dc;
                        if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) continue;
                        if (flag[nr][nc]) adjFlags.push([nr, nc]);
                        else if (!open[nr][nc]) hidden.push([nr, nc]);
                    }
                    const rem = num - adjFlags.length;
                    if (rem === hidden.length && hidden.length > 0) {
                        hidden.forEach(([nr, nc]) => { flag[nr][nc] = true; progress = true; });
                    }
                    if (rem === 0 && hidden.length > 0) {
                        hidden.forEach(([nr, nc]) => { if (!board[nr][nc].mine) { revealSim(nr, nc); progress = true; } });
                    }
                }
            }

            for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
                if (!board[r][c].mine && !open[r][c]) return false;
            }
            return true;
        }

        function eachCell(fn) {
            for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) fn(board[r][c], r, c);
        }
        function eachNeighbor(r, c, fn) {
            for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
                if (!dr && !dc) continue;
                const nr = r + dr, nc = c + dc;
                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) fn(board[nr][nc], nr, nc);
            }
        }
        function cellEl(r, c) { return gridEl.children[r * COLS + c]; }

        /* ── REVEAL (BFS) ── */
        function reveal(r, c) {
            if (over || board[r][c].open || board[r][c].flag) return;
            if (fresh) { fresh = false; plantMines(r, c); }
            const q = [[r, c]], seen = new Set();
            while (q.length) {
                const [rr, cc] = q.shift(), key = rr * COLS + cc;
                if (seen.has(key)) continue; seen.add(key);
                const d = board[rr][cc];
                if (d.open || d.flag) continue;
                d.open = true; opened++;
                if (d.mine) { explode(rr, cc); return; }
                if (d.n === 0) eachNeighbor(rr, cc, (_, nr, nc) => q.push([nr, nc]));
            }
            seen.forEach(key => { const r2 = Math.floor(key / COLS), c2 = key % COLS; updateCell(r2, c2); });
            beep('dig'); checkWin();
        }

        function toggleFlag(r, c) {
            if (over || board[r][c].open) return;
            board[r][c].flag = !board[r][c].flag;
            flagged += board[r][c].flag ? 1 : -1;
            beep('flag'); updateCell(r, c); updateHUD();
        }

        function chord(r, c) {
            const d = board[r][c];
            if (!d.open || !d.n || over) return;
            let fl = 0; eachNeighbor(r, c, nb => { if (nb.flag) fl++; });
            if (fl !== d.n) return;
            const el = cellEl(r, c);
            el.classList.add('chord');
            el.addEventListener('animationend', () => el.classList.remove('chord'), { once: true });
            eachNeighbor(r, c, (_, nr, nc) => { if (!board[nr][nc].flag && !board[nr][nc].open) reveal(nr, nc); });
        }

        function checkWin() { if (opened === ROWS * COLS - MINES) endGame(true); }

        /* ── EXPLODE ── */
        function explode(er, ec) {
            over = true; clearInterval(ticker); beep('boom');
            const hit = cellEl(er, ec);
            hit.className = 'c boom pop'; hit.textContent = '💣';
            const rest = [];
            eachCell((d, r, c) => { if (d.mine && !(r === er && c === ec)) rest.push({ r, c, dist: Math.hypot(r - er, c - ec) }); });
            rest.sort((a, b) => a.dist - b.dist);
            let delay = 420;
            rest.forEach(({ r, c }) => {
                explodeTimers.push(setTimeout(() => { const el = cellEl(r, c); el.className = 'c dead pop'; el.textContent = '💣'; beep('pop'); }, delay));
                delay += 70;
            });
            explodeTimers.push(setTimeout(() => { beep('lose'); showResult(false); }, delay + 400));
        }

        function endGame(won) {
            over = true; clearInterval(ticker);
            if (!won) return;
            beep('win');
            const cx = COLS / 2, cy = ROWS / 2;
            eachCell((d, r, c) => {
                if (!d.open) return;
                const el = cellEl(r, c);
                el.style.setProperty('--wd', Math.round(Math.hypot(r - cy, c - cx) * 55) + 'ms');
                el.classList.add('win');
            });
            setTimeout(() => showResult(true), 600);
        }

        function showResult(won) {
            const card = document.getElementById('rCard');
            card.className = 'r-card ' + (won ? 'won' : 'lost');
            document.getElementById('rEmoji').textContent = won ? '🏆' : '💣';
            document.getElementById('rTitle').textContent = won ? 'Kazandın!' : 'Oyun Bitti';
            document.getElementById('rSub').textContent = won ? 'Tüm mayınları buldun!' : 'Mayına bastın...';
            document.getElementById('rTime').textContent = secs + 's';
            document.getElementById('rMines').textContent = MINES - flagged;
            document.getElementById('rDiff').textContent = DIFF;
            document.getElementById('overlay').classList.add('show');
        }

        /* ── RENDER ── */
        function renderAll() {
            gridEl.innerHTML = '';
            for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) gridEl.appendChild(makeCell(r, c));
        }
        function makeCell(r, c) {
            const el = document.createElement('div');
            el.className = 'c'; applyCell(el, board[r][c]); attachEvents(el, r, c); return el;
        }
        function updateCell(r, c) { const el = cellEl(r, c); if (el) applyCell(el, board[r][c]); }
        function applyCell(el, d) {
            el.className = 'c'; el.textContent = '';
            if (d.open) { el.classList.add('open'); if (d.mine) el.textContent = '💣'; else if (d.n) { el.textContent = d.n; el.classList.add('n' + d.n); } }
            else if (d.flag) { el.classList.add('flag'); el.textContent = '🚩'; }
        }

        /* ── EVENTS ── */
        function attachEvents(el, r, c) {
            /* desktop */
            el.addEventListener('click', e => {
                e.preventDefault();
                if (over) return;
                const d = board[r][c];
                if (d.open && d.n) { chord(r, c); return; }
                if (d.open) return;
                if (mode === 'flag') toggleFlag(r, c); else if (!d.flag) reveal(r, c);
            });
            el.addEventListener('contextmenu', e => { e.preventDefault(); if (!over) toggleFlag(r, c); });
            el.addEventListener('mousedown', e => { if (e.button === 1) { e.preventDefault(); chord(r, c); } });

            /* mobile touch */
            let timer = null, moved = false, sx, sy;
            el.addEventListener('touchstart', e => {
                e.preventDefault(); moved = false;
                sx = e.touches[0].clientX; sy = e.touches[0].clientY;
                if (over) return;
                const d = board[r][c]; if (d.open) return;
                el.classList.add('pressing');
                timer = setTimeout(() => { timer = null; el.classList.remove('pressing'); if (!moved) toggleFlag(r, c); }, 450);
            }, { passive: false });
            el.addEventListener('touchmove', e => {
                if (Math.abs(e.touches[0].clientX - sx) > 8 || Math.abs(e.touches[0].clientY - sy) > 8) {
                    moved = true; clearTimeout(timer); timer = null; el.classList.remove('pressing');
                }
            }, { passive: true });
            el.addEventListener('touchend', e => {
                e.preventDefault(); el.classList.remove('pressing');
                if (over || moved) { clearTimeout(timer); timer = null; return; }
                const d = board[r][c];
                // Açık sayı hücresine tap → chord (timer'dan bağımsız)
                if (d.open && d.n) { clearTimeout(timer); timer = null; chord(r, c); return; }
                if (d.open) { clearTimeout(timer); timer = null; return; }
                if (timer !== null) {
                    clearTimeout(timer); timer = null;
                    if (mode === 'flag') toggleFlag(r, c); else if (!d.flag) reveal(r, c);
                }
            }, { passive: false });
        }

        newGame();
    </script>
</body>
